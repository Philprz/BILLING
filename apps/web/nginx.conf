server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # ── Headers sécurité (CDC §3.3) ──────────────────────────────────────────
    add_header X-Frame-Options          "DENY"                               always;
    add_header X-Content-Type-Options   "nosniff"                            always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"    always;
    add_header X-XSS-Protection         "0"                                  always;
    # HSTS : activé uniquement derrière TLS (reverse proxy HTTPS attendu en prod)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # CSP adaptée au build Vite (assets servis en self, pas d'inline script)
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self';"
        always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # Proxy API calls to the api service
    location /api/ {
        proxy_pass http://api:3001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
